name: Reusable - Deploy Symfony Production

# Reusable workflow. Callers invoke it via:
#
#   jobs:
#     deploy:
#       uses: nickmous/symfony-k8s-deployment-kit/.github/workflows/deploy-production.yaml@v1.0.0
#       with:
#         version: ${{ github.ref_name }}
#         prod-url: https://example.com
#       secrets: inherit
#
# The caller's repo is what gets checked out; this workflow runs against
# the caller's Dockerfile + k8s/ layout.

on:
  workflow_call:
    inputs:
      version:
        description: 'Image tag to build (e.g., v1.0.0)'
        required: true
        type: string
      prod-url:
        description: 'Primary production URL (shown in environment + summary)'
        required: false
        type: string
        default: ''
      sentry-org:
        description: 'Sentry org slug (leave blank to skip Sentry release)'
        required: false
        type: string
        default: ''
      sentry-project:
        description: 'Sentry project slug'
        required: false
        type: string
        default: ''
      sentry-url:
        description: 'Sentry instance URL (defaults to sentry.io)'
        required: false
        type: string
        default: ''
    secrets:
      SENTRY_AUTH_TOKEN:
        required: false
      FLUX_WEBHOOK_URL:
        required: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Prepare Docker image name
        id: docker
        env:
          REPO: ${{ github.repository }}
        run: |
          IMAGE_NAME=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ steps.docker.outputs.image_name }}
          tags: |
            type=raw,value=${{ inputs.version }}-${{ matrix.arch }}

      - name: Build and push ${{ matrix.platform }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SENTRY_RELEASE=${{ inputs.version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.docker.outputs.image_name }}:buildcache-prod-${{ matrix.arch }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.docker.outputs.image_name }}:buildcache-prod-${{ matrix.arch }},mode=max

  deploy:
    name: Create Manifest and Notify Flux
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ inputs.prod-url }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare Docker image name
        id: docker
        env:
          REPO: ${{ github.repository }}
        run: |
          IMAGE_NAME=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          IMAGE_BASE: ${{ env.REGISTRY }}/${{ steps.docker.outputs.image_name }}
          VERSION: ${{ inputs.version }}
        run: |
          docker buildx imagetools create -t "${IMAGE_BASE}:${VERSION}" \
            "${IMAGE_BASE}:${VERSION}-amd64" \
            "${IMAGE_BASE}:${VERSION}-arm64"

          docker buildx imagetools create -t "${IMAGE_BASE}:production-latest" \
            "${IMAGE_BASE}:${VERSION}-amd64" \
            "${IMAGE_BASE}:${VERSION}-arm64"

          docker buildx imagetools inspect "${IMAGE_BASE}:${VERSION}"

      - name: Create Sentry release
        if: inputs.sentry-org != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ inputs.sentry-org }}
          SENTRY_PROJECT: ${{ inputs.sentry-project }}
          SENTRY_URL: ${{ inputs.sentry-url }}
          RELEASE: ${{ inputs.version }}
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli releases new "$RELEASE"
          sentry-cli releases set-commits "$RELEASE" --auto
          sentry-cli releases finalize "$RELEASE"
          sentry-cli releases deploys "$RELEASE" new -e production

      - name: Trigger Flux reconciliation
        if: vars.FLUX_WEBHOOK_ENABLED == 'true'
        env:
          FLUX_WEBHOOK_URL: ${{ secrets.FLUX_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          curl -X POST "$FLUX_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"commit\": \"$COMMIT_SHA\"}" \
            --fail --silent --show-error || echo "Webhook notification failed (non-fatal)"
        continue-on-error: true

      - name: Deployment summary
        env:
          VERSION: ${{ inputs.version }}
          IMAGE_BASE: ${{ env.REGISTRY }}/${{ steps.docker.outputs.image_name }}
        run: |
          {
            echo "### Production image built"
            echo ""
            echo "**Version:** \`${VERSION}\`"
            echo "**Image:** \`${IMAGE_BASE}:${VERSION}\`"
            echo ""
            echo "Flux Image Automation picks up the new tag and updates the cluster."
          } >> "$GITHUB_STEP_SUMMARY"
