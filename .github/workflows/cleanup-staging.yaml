name: Reusable - Cleanup Staging

# Reusable workflow for removing a staging branch from the fleet repo.
# Callers wire it up to the `delete` event (auto-cleanup) and/or
# workflow_dispatch (manual).

on:
  workflow_call:
    inputs:
      app-name:
        required: true
        type: string
      fleet-repo:
        required: true
        type: string
      branch-name:
        description: 'Branch / environment name to remove (will be sanitized)'
        required: true
        type: string
    secrets:
      FLEET_REPO_TOKEN:
        required: true
      FLUX_WEBHOOK_URL:
        required: false

jobs:
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fleet-infra repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.fleet-repo }}
          token: ${{ secrets.FLEET_REPO_TOKEN }}

      - name: Generate slug
        id: branch
        env:
          BRANCH_INPUT: ${{ inputs.branch-name }}
        run: |
          BRANCH_SLUG=$(echo "$BRANCH_INPUT" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-42 | sed 's/-$//')
          echo "name=$BRANCH_INPUT" >> "$GITHUB_OUTPUT"
          echo "slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"

      - name: Remove and update
        env:
          APP: ${{ inputs.app-name }}
          BRANCH_SLUG: ${{ steps.branch.outputs.slug }}
          BRANCH_NAME: ${{ steps.branch.outputs.name }}
        run: |
          BRANCH_DIR="apps/${APP}/staging-branches/${BRANCH_SLUG}"

          if [ -d "${BRANCH_DIR}" ]; then
            rm -rf "${BRANCH_DIR}"
            echo "Removed ${BRANCH_DIR}"
          else
            echo "No staging config found for ${BRANCH_SLUG}"
          fi

          cd "apps/${APP}/staging-branches"
          {
            echo "# Root kustomization for staging branches"
            echo "# Auto-generated by GitHub Actions"
            echo "apiVersion: kustomize.config.k8s.io/v1beta1"
            echo "kind: Kustomization"
            echo ""
            echo "resources:"
          } > kustomization.yaml
          for dir in */; do
            if [ "$dir" != "generator/" ] && [ -f "${dir}kustomization.yaml" ]; then
              echo "  - ${dir}" >> kustomization.yaml
            fi
          done
          grep -q "^  - " kustomization.yaml || echo "  []" >> kustomization.yaml

          cd "${GITHUB_WORKSPACE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A "apps/${APP}/staging-branches/"

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(flux): cleanup staging ${BRANCH_SLUG}" \
              -m "Branch: ${BRANCH_NAME}"
            git push
          fi

      - name: Trigger Flux reconciliation
        if: vars.FLUX_WEBHOOK_ENABLED == 'true'
        env:
          FLUX_WEBHOOK_URL: ${{ secrets.FLUX_WEBHOOK_URL }}
          BRANCH_SLUG: ${{ steps.branch.outputs.slug }}
        run: |
          curl -X POST "$FLUX_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"action\": \"cleanup\", \"branch\": \"$BRANCH_SLUG\"}" \
            --fail --silent --show-error || echo "Webhook notification failed (non-fatal)"
        continue-on-error: true
