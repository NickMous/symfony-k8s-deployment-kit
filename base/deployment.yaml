apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app.kubernetes.io/name: app
    app.kubernetes.io/component: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app
      app.kubernetes.io/component: application
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app
        app.kubernetes.io/component: application
    spec:
      imagePullSecrets:
        - name: image-pull-secret
      initContainers:
        # No-op when postgres isn't enabled (POSTGRES_HOST configmap key absent).
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              if [ -z "${POSTGRES_HOST}" ]; then
                echo "POSTGRES_HOST not set, skipping wait"
                exit 0
              fi
              until pg_isready -h "${POSTGRES_HOST}" -p 5432 -U "${POSTGRES_USER:-postgres}"; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_HOST
                  optional: true
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-postgres-secret
                  key: username
                  optional: true

        - name: copy-public-files
          image: app-image
          workingDir: /app
          command:
            - sh
            - -c
            - |
              echo "Copying public files to shared volume..."
              cp -rv /app/public-original/* /app/public/
              echo "Public files copied successfully"
          volumeMounts:
            - name: app-public
              mountPath: /app/public

        - name: run-migrations
          image: app-image
          workingDir: /app
          command:
            - sh
            - -c
            - |
              echo "Running database migrations..."
              php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
              echo "Migrations completed successfully"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-branch-secret
                optional: true
            - secretRef:
                name: app-secret
          volumeMounts:
            - name: app-var
              mountPath: /app/var

        - name: cache-warmup
          image: app-image
          workingDir: /app
          command:
            - sh
            - -c
            - |
              php bin/console cache:clear --no-warmup
              php bin/console cache:warmup
              # importmap is a no-op if not using AssetMapper
              php bin/console importmap:install 2>/dev/null || true
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-branch-secret
                optional: true
            - secretRef:
                name: app-secret
          volumeMounts:
            - name: app-var
              mountPath: /app/var
            - name: app-public
              mountPath: /app/public

      containers:
        - name: nginx
          image: app-nginx-image
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: app-public
              mountPath: /app/public
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5

        - name: php-fpm
          image: app-image
          workingDir: /app
          ports:
            - containerPort: 9000
              name: php-fpm
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-branch-secret
                optional: true
            - secretRef:
                name: app-secret
          volumeMounts:
            - name: app-var
              mountPath: /app/var
            - name: app-public
              mountPath: /app/public
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5

      volumes:
        - name: nginx-config
          configMap:
            name: app-nginx-config
        - name: app-var
          emptyDir: {}
        - name: app-public
          emptyDir: {}
