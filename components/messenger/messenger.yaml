apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-messenger
  labels:
    app.kubernetes.io/name: app-messenger
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: app-messenger
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-messenger
        app.kubernetes.io/component: worker
    spec:
      imagePullSecrets:
        - name: image-pull-secret
      initContainers:
        - name: wait-for-app
          image: busybox
          command:
            - sh
            - -c
            - |
              until wget -q --spider "http://${APP_SERVICE_HOST}/health" 2>/dev/null; do
                echo "Waiting for main application..."
                sleep 5
              done
              echo "Main application is ready!"
          env:
            - name: APP_SERVICE_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_SERVICE_HOST

        - name: cache-warmup
          image: app-image
          workingDir: /app
          command:
            - sh
            - -c
            - |
              php bin/console cache:clear --no-warmup
              php bin/console cache:warmup
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-branch-secret
                optional: true
            - secretRef:
                name: app-secret
          volumeMounts:
            - name: app-var
              mountPath: /app/var

      containers:
        - name: messenger
          image: app-image
          workingDir: /app
          command:
            - php
            - bin/console
            - messenger:consume
            - async
            - --time-limit=3600
            - --memory-limit=256M
            - -vv
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-branch-secret
                optional: true
            - secretRef:
                name: app-secret
          volumeMounts:
            - name: app-var
              mountPath: /app/var
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - ps aux | grep 'messenger:consume' | grep -v grep
            initialDelaySeconds: 60
            periodSeconds: 30

      volumes:
        - name: app-var
          emptyDir: {}
      restartPolicy: Always
