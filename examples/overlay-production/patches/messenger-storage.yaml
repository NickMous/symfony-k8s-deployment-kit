# Mount the shared storage PVC into the messenger worker.
# Only needed when both the storage and messenger components are enabled.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-messenger
spec:
  template:
    spec:
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: app-storage
      containers:
        - name: messenger
          volumeMounts:
            - name: storage
              mountPath: /app/storage
