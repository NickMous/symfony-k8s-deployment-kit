# In a real project these would be SOPS-encrypted and named e.g. secrets.sops.yaml.
# Whatever filename you use, list it in kustomization.yaml's resources.
# Names must match what the base/components reference (without the namePrefix
# — kustomize adds the prefix and rewrites references for you).
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  APP_SECRET: change-me
  DATABASE_URL: "postgresql://user:pass@app-postgres:5432/dbname?serverVersion=16&charset=utf8"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-postgres-secret
type: Opaque
stringData:
  username: change-me
  password: change-me
