apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-staging-tls
  labels:
    app.kubernetes.io/component: certificate
spec:
  secretName: app-staging-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - staging.example.com
  usages:
    - digital signature
    - key encipherment
